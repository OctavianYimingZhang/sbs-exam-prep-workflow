name: Apply Codex patch b226874

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Apply source patch
        run: |
          cat .codex_tmp_b226874/patch.part* > /tmp/codex.patch
          git apply /tmp/codex.patch

      - name: Build compacted Custom GPT bundle
        run: |
          python3 .codex_tmp_b226874/build_compacted.py

      - name: Install verification dependency
        run: |
          python3 -m pip install python-docx

      - name: Verify key gates
        run: |
          python3 -m compileall -q scripts
          python3 scripts/generate_example_essay_docx.py --plan tests/fixtures/example_essay_docx/positive_docx_plan.json --output-dir /tmp/eep_positive_docx --clean --strict
          if python3 scripts/generate_example_essay_docx.py --plan tests/fixtures/example_essay_docx/public_preamble_plan.json --output-dir /tmp/eep_public_preamble_docx --clean --strict; then
            echo 'public preamble negative fixture unexpectedly passed' >&2
            exit 1
          fi
          python3 scripts/docx_format_linter.py /tmp/eep_positive_docx --check-language
          test "$(find custom_gpt_knowledge -maxdepth 1 -type f | wc -l | tr -d ' ')" = "1"
          grep -q 'Universal Output Gate' custom_gpt_knowledge/Everything-Exam-Preparation-Knowledge-Combined.md
          grep -q 'Citation / Extra Reading Papers' custom_gpt_knowledge/Everything-Exam-Preparation-Knowledge-Combined.md

      - name: Commit final changes
        run: |
          rm -rf .codex_tmp_b226874 .github/workflows/codex-apply-b226874.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Harden example essay DOCX output rules'
          git push
