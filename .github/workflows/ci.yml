name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile scripts
        run: python -m compileall -q scripts
      - name: Lint essay-style fixture
        run: python scripts/essay_style_linter.py --fixture benchmarks/kp_essay_style_linter_fixtures.json
      - name: Validate cross-subject benchmark metadata
        run: python scripts/cross_subject_regression_check.py --metadata-only --suite benchmarks/cross_subject_regression_suite.json
      - name: Validate long-answer benchmark metadata
        run: python scripts/cross_subject_regression_check.py --metadata-only --suite benchmarks/biol21111_long_answer_suite.json
      - name: Public safety scan
        run: |
          python - <<'PY'
          import pathlib
          import re
          import sys

          patterns = [
              "/" + "Users/",
              "One" + "Drive",
              "Cloud" + "Storage",
              "octavian" + "zhang",
              "Desk" + "top",
              "University of " + "Manchester",
              "School of " + "Biological",
          ]
          regex = re.compile("|".join(re.escape(pattern) for pattern in patterns))
          hits = []
          for path in pathlib.Path(".").rglob("*"):
              if ".git" in path.parts or not path.is_file():
                  continue
              try:
                  text = path.read_text(errors="ignore")
              except Exception:
                  continue
              if regex.search(text):
                  hits.append(str(path))
          if hits:
              print("\n".join(hits))
              sys.exit(1)
          PY
