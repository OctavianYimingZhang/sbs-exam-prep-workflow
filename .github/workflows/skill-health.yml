name: Skill health

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * 1"

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt
      - name: Run Skill doctor
        run: python3 scripts/skill_maintenance.py doctor --json
