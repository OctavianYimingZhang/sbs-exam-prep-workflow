interface:
  display_name: "Everything Exam Preparation"
  short_description: "Evidence-grounded exam-prep workflow with setup, planning, Academic Exam-Ready Notes, and question-type DOCX add-on routes"
  default_prompt: "Use $everything-exam-preparation to turn my lecture slides, official notes, ordered course notes, past papers, practical materials, answer keys, exemplars, feedback, and readings into the narrowest valid exam-prep route. Build a SkillConfig, create a WorkflowPlan, check input readiness, and by default generate exam-informed Academic Exam-Ready Notes in Lecture_Knowledge_Walkthrough.docx. If I ask for MCQ, Short Answer, Long Answer/Project/Scenario, or Essay preparation, add the matching DOCX report. Use past-paper analysis as a chat-only brief before file generation. Keep helper artifacts separate unless I ask for an audit package."

policy:
  allow_implicit_invocation: true
