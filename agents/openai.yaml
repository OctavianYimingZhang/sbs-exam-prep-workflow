interface:
  display_name: "SBS Exam Prep Workflow"
  short_description: "Evidence-grounded exam-prep workflow with setup, planning, Word walkthrough, Excel, and optional Example Essay routes"
  default_prompt: "Use $sbs-exam-prep-workflow to turn my lecture slides, official notes, past papers, practical materials, answer keys, exemplars, feedback, and readings into the narrowest valid exam-prep route. Build a SkillConfig, create a WorkflowPlan, check input readiness, and by default generate a lecture-first Knowledge Walkthrough DOCX unless I explicitly ask for Excel, MCQ, Short Answer, Long Answer, prediction, or Example Essay outputs. Keep helper artifacts separate unless I ask for an audit package."

policy:
  allow_implicit_invocation: true
